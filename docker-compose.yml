services:
  mongodb:
    image: mongo:7
    container_name: vee-mongodb
    ports:
      - "27017:27017"
    profiles:
      - production
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-dev:
    image: mongo:7
    container_name: vee-mongodb-dev
    ports:
      - "27017:27017"
    profiles:
      - dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data_dev:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: vee-server-dev
    ports:
      - "3000:3000"
    profiles:
      - dev
    environment:
      MONGO_URI: mongodb://root:password@mongodb-dev:27017/vee?authSource=admin
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
      - ~/.vee:/root/.vee
    depends_on:
      mongodb-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  server-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: vee-server-prod
    ports:
      - "3000:3000"
    profiles:
      - production
    environment:
      MONGO_URI: mongodb://root:password@mongodb:27017/vee?authSource=admin
      NODE_ENV: production
    volumes:
      - ~/.vee:/root/.vee
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
  mongodb_data_dev:
